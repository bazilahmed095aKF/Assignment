<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Exercise 3: Future Event Countdown</title>
</head>
<body>

<h1>Future Event Countdown</h1>

<input type="date" id="eventDate">
<button onclick="showRemainingTime()">Remaining Time</button>

<div id="results" style="display:none;">
  <p>Remaining Days: <span id="days"></span></p>
  <p>Remaining Hours: <span id="hours"></span></p>
  <p>Remaining Minutes: <span id="minutes"></span></p>
  <p>Remaining Seconds: <span id="seconds"></span></p>
</div>

<p id="error"></p>

<script>
  function showRemainingTime() {
    const dateInput = document.getElementById("eventDate").value;
    const errorEl = document.getElementById("error");
    const resultsEl = document.getElementById("results");

    errorEl.textContent = "";

    if (!dateInput) {
      errorEl.textContent = "Please choose a date first.";
      resultsEl.style.display = "none";
      return;
    }

    const eventDate = new Date(dateInput);
    const now = new Date();
    const diffMs = eventDate - now;

    if (diffMs <= 0) {
      errorEl.textContent = "Please choose a date in the future.";
      resultsEl.style.display = "none";
      return;
    }

    const totalSeconds = Math.floor(diffMs / 1000);

    const days = Math.floor(totalSeconds / (60 * 60 * 24));
    const hours = Math.floor((totalSeconds % (60 * 60 * 24)) / (60 * 60));
    const minutes = Math.floor((totalSeconds % (60 * 60)) / 60);
    const seconds = totalSeconds % 60;

    document.getElementById("days").textContent = days;
    document.getElementById("hours").textContent = hours;
    document.getElementById("minutes").textContent = minutes;
    document.getElementById("seconds").textContent = seconds;

    resultsEl.style.display = "block";
  }
</script>

</body>
</html>
